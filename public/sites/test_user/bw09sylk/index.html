<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Awesome Site</title>
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #f8fafc; }
.hero { background: linear-gradient(135deg, #7c3aed, #06b6d4); min-height: 100vh; color: white; }
.navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; }
.logo { font-size: 1.5rem; font-weight: 800; }
.nav-links { display: flex; gap: 2rem; }
.nav-links a { color: white; text-decoration: none; opacity: 0.9; transition: opacity 0.3s; }
.nav-links a:hover { opacity: 1; }
.btn-primary { background: white; color: #7c3aed; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: transform 0.3s; }
.btn-primary:hover { transform: translateY(-2px); }
.btn-secondary { background: transparent; color: white; border: 2px solid white; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
.btn-lg { padding: 1rem 2rem; font-size: 1.1rem; }
.hero-content { text-align: center; padding: 4rem 5% 6rem; max-width: 900px; margin: 0 auto; }
.hero-content h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.1; }
.subtitle { font-size: 1.25rem; opacity: 0.95; margin-bottom: 2rem; }
.hero-buttons { display: flex; gap: 1rem; justify-content: center; margin-bottom: 3rem; }
.hero-img { width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
.features { padding: 5rem 5%; max-width: 1200px; margin: 0 auto; }
.features h2 { text-align: center; font-size: 2.5rem; margin-bottom: 3rem; }
.feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
.feature-card { background: #1e293b; padding: 2rem; border-radius: 12px; text-align: center; transition: transform 0.3s; }
.feature-card:hover { transform: translateY(-5px); }
.feature-icon { font-size: 3rem; margin-bottom: 1rem; }
.cta-section { text-align: center; padding: 5rem 5%; background: #1e293b; }
.cta-section h2 { font-size: 2.5rem; margin-bottom: 1rem; }
.footer { text-align: center; padding: 2rem; background: #0f172a; opacity: 0.7; }
@media (max-width: 768px) { .hero-content h1 { font-size: 2.2rem; } .nav-links { display: none; } }</style>
</head>
<body>
  <header class="hero">
  <nav class="navbar">
    <div class="logo">MyBrand</div>
    <div class="nav-links">
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact</a>
    </div>
    <button class="btn-primary">Get Started</button>
  </nav>
  <div class="hero-content">
    <h1>My Awesome Site</h1>
    <p class="subtitle">Built with ShadowDeploy</p>
    <div class="hero-buttons">
      <button class="btn-primary btn-lg">Try Now</button>
      <button class="btn-secondary btn-lg">Learn More</button>
    </div>
    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800" alt="Hero" class="hero-img">
  </div>
</header>
<section id="features" class="features">
  <h2>Our Features</h2>
  <div class="feature-grid">
    <div class="feature-card">
      <div class="feature-icon">⚡</div>
      <h3>Fast</h3>
      <p>Super fast performance</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">🔒</div>
      <h3>Secure</h3>
      <p>Bank-grade security</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">📊</div>
      <h3>Analytics</h3>
      <p>Real-time data</p>
    </div>
  </div>
</section>
<section class="cta-section">
  <h2>Get Started Today</h2>
  <p>Join thousands of users</p>
  <button class="btn-primary btn-lg">Sign Up Now</button>
</section>
<footer class="footer">
  <p>© 2025 MyBrand</p>
</footer>
</body>
</html>
